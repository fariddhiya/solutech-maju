services:
  postgres:
    image: postgres:16-alpine
    container_name: solutech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solutech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solutech_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solutech-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/solutech_db?schema=public
      JWT_SECRET: your-secret-key-min-32-characters-long
      JWT_EXPIRES_IN: 1d
      RATE_LIMIT_WINDOW_SECONDS: 900
      RATE_LIMIT_MAX_REQUESTS: 100
      LOGIN_RATE_LIMIT_MAX_REQUESTS: 5
      ENABLE_REQUEST_LOGGING: true
      ENABLE_RATE_LIMITING: true
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node server.js"

volumes:
  postgres_data:
